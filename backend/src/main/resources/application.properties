# ── Server ────────────────────────────────────────────────────────────────────
# Railway injects $PORT — must bind to it, not hardcoded 8080
server.port=${PORT:8080}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:intellicore-super-secret-key-change-in-production-2024}
jwt.expiration=86400000

# ── Storage ───────────────────────────────────────────────────────────────────
storage.path=${STORAGE_PATH:./data}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://*.vercel.app}

# ── File Upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.intellicore=INFO
logging.level.org.springframework.security=WARN
logging.level.org.apache.pdfbox=WARN
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# ── Python interop ────────────────────────────────────────────────────────────
python.script.path=${PYTHON_SCRIPT_PATH:./src/main/python/blur_detection.py}
python.executable=${PYTHON_EXECUTABLE:python3}

# ── Actuator / Health (Spring Boot built-in, used as fallback) ────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Startup optimisation ──────────────────────────────────────────────────────
spring.main.lazy-initialization=false
