server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:intellicore-super-secret-key-change-in-production-2024}
jwt.expiration=86400000

# File Storage
storage.path=${STORAGE_PATH:./data}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://*.vercel.app}

# Max upload size
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Logging
logging.level.com.intellicore=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} - %msg%n

# Python script path
python.script.path=${PYTHON_SCRIPT_PATH:./src/main/python/blur_detection.py}
python.executable=${PYTHON_EXECUTABLE:python3}
